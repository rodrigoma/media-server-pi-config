services:
  transmission:
    image: lscr.io/linuxserver/transmission:arm64v8-latest
    container_name: transmission
    hostname: transmission
    networks:
      - traefik
    ports:
      - 9091:9091
      - 51413:51413
      - 51413:51413/udp
    labels:
      - sqlbak.stop.first=true
      - sqlbak.start.first=false
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.transmission.rule=Host(`transmission.${MY_DOMAIN}`)
      - traefik.http.routers.transmission.entryPoints=websecure
      - traefik.http.routers.transmission.tls=true
      - traefik.http.routers.transmission.tls.certResolver=le
      - traefik.http.services.transmission.loadBalancer.server.port=9091
    environment:
      - TZ=America/Sao_Paulo
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - USER=${TRANSMISSION_USER}
      - PASS=${TRANSMISSION_PASSWORD}
      - TRANSMISSION_WEB_HOME=/config/flood-for-transmission/
      - TRANSMISSION_SERVER=${TRANSMISSION_SERVER}
      - SICKGEAR_TOKEN=${SICKGEAR_TOKEN}
      - SICKCHILL_TOKEN=${SICKCHILL_TOKEN}
      - SCRIPT_TORRENT_DONE_ENABLED=true
      - SCRIPT_TORRENT_DONE_FILENAME=/scripts/transmission_remove_finished.sh
    volumes:
      - /home/pi/centerMedia/SupportApps/transmission/config:/config
      - /home/pi/centerMedia/SupportApps/transmission/watch:/watch
      - /home/pi/downloads/torrents:/downloads
      - ${MEDIA_REPO_PATH}/services/transmission/scripts:/scripts
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik
