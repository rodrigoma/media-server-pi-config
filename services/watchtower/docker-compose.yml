services:
  watchtower:
    image: nickfedor/watchtower:armhf-latest
    user: "${USER_ID}:${GROUP_ID}"
    container_name: watchtower
    hostname: watchtower
    networks:
      - traefik
    labels:
      - sqlbak.stop.first=false
      - sqlbak.start.first=true
    environment:
      - TZ=America/Sao_Paulo
      - WATCHTOWER_DEBUG=true
      - WATCHTOWER_LABEL_ENABLE=true
      - WATCHTOWER_HTTP_API_UPDATE=true
      - WATCHTOWER_HTTP_API_PERIODIC_POLLS=false
      - WATCHTOWER_HTTP_API_METRICS=true
      - WATCHTOWER_HTTP_API_TOKEN=${TRANSMISSION_PASSWORD}
      - WATCHTOWER_CLEANUP=true
      - WATCHTOWER_SCHEDULE="0 0 17 * * 5"
      - WATCHTOWER_NOTIFICATION_URL="telegram://${TELE_TOKEN_WATCHTOWER}@telegram?chats=${CHAT_ID}"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik
