services:
  reposilite:
    image: dzikoysk/reposilite:latest
    container_name: reposilite
    hostname: reposilite
    networks:
      - traefik
    ports:
      - 9999:9999
    labels:
      - sqlbak.stop.first=true
      - sqlbak.start.first=false
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.reposilite.rule=Host(`reposilite.${MY_DOMAIN}`)
      - traefik.http.routers.reposilite.entryPoints=websecure
      - traefik.http.routers.reposilite.tls=true
      - traefik.http.routers.reposilite.tls.certResolver=le
      - traefik.http.routers.reposilite.middlewares=basicAuth@docker
      - traefik.http.services.reposilite.loadBalancer.server.port=9999
    environment:
      - TZ=America/Sao_Paulo
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - REPOSILITE_OPTS=--port 9999
    volumes:
      - /home/pi/centerMedia/SupportApps/reposilite:/app/data
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik
