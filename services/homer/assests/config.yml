---
# Homepage configuration
# See https://fontawesome.com/icons for icons options

title: "Media Server Pi4"
subtitle: "Pi4 Dashboard"
logo: "assets/images/raspberry-pi.png"

header: true
footer: false

# Optional theme customization
theme: default
colors:
  light:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#f5f5f5"
    card-background: "#ffffff"
    text: "#363636"
    text-header: "#ffffff"
    text-title: "#303030"
    text-subtitle: "#424242"
    card-shadow: rgba(0, 0, 0, 0.1)
    link-hover: "#363636"
  dark:
    highlight-primary: "#3367d6"
    highlight-secondary: "#4285f4"
    highlight-hover: "#5a95f5"
    background: "#131313"
    card-background: "#2b2b2b"
    text: "#eaeaea"
    text-header: "#ffffff"
    text-title: "#fafafa"
    text-subtitle: "#f5f5f5"
    card-shadow: rgba(0, 0, 0, 0.4)
    link-hover: "#ffdd57"

links:
  - name: "Project"
    icon: "assets/images/github.png"
    url: "https://github.com/rodrigoma/media-server-pi-config"
    target: "_blank"

services:
  - name: "Monitoring"
    icon: ""
    items:
      - name: "Grafana"
        type: Ping
        logo: "assets/tools/grafana.png"
        subtitle: "Visualization web application"
        url: "https://grafana.rodrigoma.duckdns.org"
        method: "get"

      - name: "Prometheus"
        type: Prometheus
        logo: "assets/tools/prometheus.png"
        subtitle: "Systems monitoring and alerting tool"
        url: "https://prometheus.rodrigoma.duckdns.org"
        method: "get"

      - name: "Traefik"
        type: Ping
        logo: "assets/tools/traefik.png"
