services:
  homer:
    image: b4bz/homer:latest
    container_name: homer
    hostname: homer
    networks:
      - traefik
    ports:
      - 8080:8080
    labels:
      - sqlbak.stop.first=true
      - sqlbak.start.first=false
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.homer.rule=Host(`homer.${USER_DOMAIN}`)
      - traefik.http.routers.homer.entryPoints=websecure
      - traefik.http.routers.homer.tls=true
      - traefik.http.routers.homer.tls.certResolver=le
      - traefik.http.services.homer.loadBalancer.server.port=8080
    environment:
      - TZ=America/Sao_Paulo
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
      - INIT_ASSETS=1
    volumes:
      - /home/pi/centerMedia/SupportApps/homer/assets:/www/assets
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik
