services:
  wallos:
    image: bellamy/wallos:latest
    container_name: wallos
    hostname: wallos
    networks:
      - traefik
    ports:
      - 8282:80
    labels:
      - sqlbak.stop.first=true
      - sqlbak.start.first=false
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.wallos.rule=Host(`wallos.${USER_DOMAIN}`)
      - traefik.http.routers.wallos.entryPoints=websecure
      - traefik.http.routers.wallos.tls=true
      - traefik.http.routers.wallos.tls.certResolver=le
      - traefik.http.services.wallos.loadBalancer.server.port=80
    environment:
      - TZ=America/Sao_Paulo
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
    volumes:
      - /home/pi/centerMedia/SupportApps/wallos/db:/var/www/html/db
      - /home/pi/centerMedia/SupportApps/wallos/logos:/var/www/html/images/uploads/logos
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik
