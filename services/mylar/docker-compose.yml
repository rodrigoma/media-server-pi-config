services:
  mylar:
    image: lscr.io/linuxserver/mylar3:arm64v8-latest
    container_name: mylar
    hostname: mylar
    networks:
      - traefik
    ports:
      - 8090:8090
    labels:
      - sqlbak.stop.first=true
      - sqlbak.start.first=false
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.mylar.rule=Host(`mylar.${MY_DOMAIN}`)
      - traefik.http.routers.mylar.entryPoints=websecure
      - traefik.http.routers.mylar.tls=true
      - traefik.http.routers.mylar.tls.certResolver=le
      - traefik.http.routers.mylar.middlewares=basicAuth@docker
      - traefik.http.services.mylar.loadBalancer.server.port=8090
    environment:
      - TZ=America/Sao_Paulo
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
    volumes:
      - /home/pi/centerMedia/SupportApps/mylar/data:/config
      - /home/pi/downloads/torrents/complete:/downloads
      - /home/pi/downloads/mylar:/comics
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik
