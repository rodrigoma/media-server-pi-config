services:
  sickgear:
    image: lscr.io/linuxserver/sickgear:arm64v8-latest
    user: "${USER_ID}:${GROUP_ID}"
    container_name: sickgear
    hostname: sickgear
    networks:
      - traefik
    ports:
      - 7081:7081
    labels:
      - sqlbak.stop.first=true
      - sqlbak.start.first=false
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.sickgear.rule=Host(`sickgear.${MY_DOMAIN}`)
      - traefik.http.routers.sickgear.entryPoints=websecure
      - traefik.http.routers.sickgear.tls=true
      - traefik.http.routers.sickgear.tls.certResolver=le
      - traefik.http.routers.sickgear.middlewares=basicAuth@docker
      - traefik.http.services.sickgear.loadBalancer.server.port=7081
    environment:
      - TZ=America/Sao_Paulo
    volumes:
      - /home/pi/centerMedia/SupportApps/sickgear/data:/config
      - /home/pi/downloads/torrents/complete:/downloads
      - /home/pi/digaoflix/tv_ongoing:/tv
      - /home/pi/digaoflix/tv_old/30min:/tvAntigas30min
      - /home/pi/digaoflix/tv_old/60min:/tvAntigas60min
      - /home/pi/digaoflix/on_streaming:/streaming
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik
