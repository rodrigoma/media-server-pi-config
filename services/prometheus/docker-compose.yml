services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus
    hostname: prometheus
    networks:
      - traefik
    ports:
      - 9090:9090
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
    labels:
      - sqlbak.stop.first=false
      - sqlbak.start.first=true
      - com.centurylinklabs.watchtower.enable=true
      - traefik.enable=true
      - traefik.http.routers.prometheus.rule=Host(`prometheus.${MY_DOMAIN}`)
      - traefik.http.routers.prometheus.entryPoints=websecure
      - traefik.http.routers.prometheus.tls=true
      - traefik.http.routers.prometheus.tls.certResolver=le
      - traefik.http.routers.prometheus.middlewares=basicAuth@docker
      - traefik.http.services.prometheus.loadBalancer.server.port=9090
    environment:
      - TZ=America/Sao_Paulo
      - PUID=${USER_ID}
      - PGID=${GROUP_ID}
    volumes:
      - /home/pi/centerMedia/SupportApps/prometheus/data:/prometheus
      - /home/pi/centerMedia/SupportApps/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml
    restart: unless-stopped

networks:
  traefik:
    external: true
    name: traefik
